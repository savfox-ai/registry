schema_version = 2

[package]
kind = "skill"
slug = "json-transform"
name = "JSON Transform"
description = "Transform and query JSON data using jq and Python."
version = "1.0.0"
license = "Apache-2.0"
icon = "🔄"

[author]
name = "_"

[discovery]
keywords = ["json", "jq", "transform", "query", "filter", "data"]
categories = ["data-processing", "utilities"]

[source]
kind = "bundle"
subdir = "."

[runtime]
bins = ["jq"]
env = []

[[runtime.install]]
id = "brew"
kind = "brew"
package = "jq"
bins = ["jq"]
label = "Homebrew"

[[runtime.install]]
id = "apt"
kind = "apt"
package = "jq"
bins = ["jq"]
label = "APT"

[[runtime.install]]
id = "choco"
kind = "choco"
package = "jq"
bins = ["jq"]
label = "Chocolatey"

[links]
repository = "https://github.com/savfox-ai/registry"
