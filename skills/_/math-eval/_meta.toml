schema_version = 2

[package]
kind = "skill"
slug = "math-eval"
name = "Math Eval"
description = "Evaluate math expressions using shell arithmetic and Python."
version = "1.0.0"
license = "Apache-2.0"
icon = "🧮"

[author]
name = "_"

[discovery]
keywords = ["math", "calculator", "arithmetic", "python"]
categories = ["utilities"]

[source]
kind = "bundle"
subdir = "."

[runtime]
bins = ["python3"]
env = []

[[runtime.install]]
id = "brew"
kind = "brew"
package = "python@3"
bins = ["python3"]
label = "Homebrew"

[links]
repository = "https://github.com/savfox-ai/registry"
